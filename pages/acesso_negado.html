<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso Negado — Ribas App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    .error-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      padding: 24px;
    }
    .error-card {
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .error-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      display: block;
    }
    .error-code {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 5rem;
      font-weight: 800;
      color: #c0392b;
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -2px;
    }
    .error-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }
    .error-desc {
      color: #8888aa;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .error-user-info {
      background: #111128;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 28px;
      font-size: 0.85rem;
      color: #aaaacc;
      border-left: 3px solid #c0392b;
      text-align: left;
    }
    .error-user-info strong { color: #ccccee; }
    .error-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn-back {
      background: #2a2a45;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-family: 'Barlow', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-back:hover { background: #3a3a5a; }
    .btn-logout {
      background: #c0392b;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-family: 'Barlow', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-logout:hover { background: #e74c3c; }
  </style>
</head>
<body>
  <div class="error-screen">
    <div class="error-card">
      <span class="error-icon">🚫</span>
      <div class="error-code">403</div>
      <div class="error-title">Acesso Negado</div>
      <p class="error-desc">
        Você não tem permissão para acessar esta página.<br>
        Seu nível de acesso não inclui esta funcionalidade do sistema.
      </p>
      <div class="error-user-info" id="userInfo">
        Carregando informações do usuário...
      </div>
      <div class="error-actions">
        <button class="btn-back" id="btnVoltar">← Voltar ao Painel</button>
        <button class="btn-logout" id="btnLogout">Deslogar</button>
      </div>
    </div>
  </div>

  <script>
    const user = (() => {
      try { return JSON.parse(localStorage.getItem("currentUser")); }
      catch { return null; }
    })();

    const roleLabel = { admin: "Administrador", rh: "Recursos Humanos", operador: "Operador de Campo" };

    if (user) {
      document.getElementById("userInfo").innerHTML =
        `Logado como: <strong>${user.nome || "Usuário"}</strong> · Nível: <strong>${roleLabel[user.role] || user.role}</strong> · Matrícula: <strong>${user.matricula || "-"}</strong>`;
    } else {
      document.getElementById("userInfo").innerHTML = "Sessão não identificada.";
    }

    // Volta para o painel correto conforme papel
    document.getElementById("btnVoltar").addEventListener("click", () => {
      if (!user) { window.location.href = "../index.html"; return; }
      const map = { admin: "admin.html", rh: "rh.html", operador: "operador.html" };
      window.location.href = map[user.role] || "../index.html";
    });

    document.getElementById("btnLogout").addEventListener("click", () => {
      localStorage.removeItem("currentUser");
      window.location.href = "../index.html";
    });
  </script>
</body>
</html>
