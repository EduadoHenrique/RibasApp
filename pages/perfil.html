<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <title>Perfil</title>

  <link rel="stylesheet" href="style.css">

</head>

<body class="admin-body">

  <main class="dashboard">

    <header class="dashboard-header">

      <h1 class="dashboard-title">
        Meu Perfil
      </h1>

      <button
        class="logout-btn"
        onclick="window.location.href='index.html'"
      >
        Deslogar
      </button>

    </header>

    <section class="form-panel">

      <div class="form-grid">

        <div class="form-group">
          <label>Nome</label>
          <input value="Carlos Silva" disabled>
        </div>

        <div class="form-group">
          <label>Matrícula</label>
          <input value="000123" disabled>
        </div>

        <div class="form-group">
          <label>Cargo</label>
          <input value="Administrador" disabled>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input value="carlos@ribas.com" disabled>
        </div>

        <div class="form-group">
          <label>Nova senha</label>
          <input type="password">
        </div>

      </div>

      <button class="save-btn">
        Atualizar Senha
      </button>

    </section>

  </main>

</body>
</html>
