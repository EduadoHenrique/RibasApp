<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Meu Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>

<body class="admin-body">

  <main class="dashboard">

    <header class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center;">
      <div>
        <div class="mini-badge">Configurações do Admin</div>
        <h1 class="dashboard-title">Perfil do Administrador</h1>
      </div>

      <button class="logout-btn" id="logoutBtn">Deslogar</button>
    </header>

    <section class="form-panel">
      <div class="panel-top">
        <div>
          <div class="mini-badge green">Segurança</div>
          <h2 class="panel-title">Visualizar Informações & Alterar Senha</h2>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Nome do Administrador</label>
          <input type="text" value="Gestor de Operações Frota" disabled>
        </div>

        <div class="form-group">
          <label>Identificação / ID</label>
          <input type="text" value="ADM-7716" disabled>
        </div>

        <div class="form-group">
          <label>E-mail Associado</label>
          <input type="text" value="admin.operacional@ribas.com" disabled>
        </div>

        <div class="form-group">
          <label>Nível de Acesso</label>
          <input type="text" value="Administrador Master" disabled>
        </div>

        <div class="form-group">
          <label style="color: #f0ad4e;">Nova Senha</label>
          <input type="password" id="novaSenha" placeholder="Insira a nova senha">
        </div>

        <div class="form-group">
          <label style="color: #f0ad4e;">Confirmar Nova Senha</label>
          <input type="password" id="confirmaSenha" placeholder="Confirme a nova senha">
        </div>
      </div>

      <div class="actions" style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
        <button class="save-btn" style="background-color: #555;" onclick="window.location.href='admin.html'">Voltar ao Painel</button>
        <button class="save-btn" id="updatePasswordBtn">Atualizar Senha</button>
      </div>
    </section>

  </main>

  <script src="../scripts/perfil_admin.js"></script>
</body>

</html>
