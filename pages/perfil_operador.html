<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil - Operador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    .first-login-banner {
      display: none;
      align-items: center;
      gap: 12px;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-left: 4px solid #e6a800;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 20px;
      font-size: 0.95rem;
      color: #856404;
      animation: slideDown .3s ease;
    }
    .first-login-banner.visible { display: flex; }
    .first-login-banner strong { color: #533f03; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="admin-body">
  <main class="dashboard">
    <header class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center;">
      <div>
        <div class="mini-badge">Ficha do Profissional</div>
        <h1 class="dashboard-title">Meu Perfil</h1>
      </div>
      <button class="logout-btn" id="logoutBtn">Deslogar</button>
    </header>

    <!-- Banner primeiro login -->
    <div class="first-login-banner" id="firstLoginBanner">
      🔐 <span><strong>Primeiro acesso detectado!</strong> Por segurança, altere sua senha padrão antes de continuar.</span>
    </div>

    <!-- Dados pessoais (somente visualização) -->
    <section class="form-panel" style="margin-bottom: 20px;">
      <div class="panel-top">
        <div>
          <div class="mini-badge">Informações Pessoais</div>
          <h2 class="panel-title">Dados do Profissional</h2>
        </div>
        <div class="status-pill" id="perfilMatricula" style="font-family:monospace; font-size:0.85rem;"></div>
      </div>

      <div class="form-grid" style="margin-top:15px;">
        <div class="form-group"><label>Nome Completo</label><input type="text" id="opNome" disabled></div>
        <div class="form-group"><label>Matrícula</label><input type="text" id="opMatricula" disabled></div>
        <div class="form-group"><label>Função Operacional</label><input type="text" id="opFuncao" disabled></div>
        <div class="form-group"><label>Telefone</label><input type="text" id="opTelefone" disabled></div>
        <div class="form-group"><label>Categoria CNH</label><input type="text" id="opCnh" disabled></div>
        <div class="form-group"><label>Vencimento da CNH</label><input type="text" id="opValidadeCnh" disabled></div>
        <div class="form-group"><label>Próximo Exame ASO</label><input type="text" id="opAso" disabled></div>
        <div class="form-group"><label>Treinamento</label><input type="text" id="opTreinamento" disabled></div>
        <div class="form-group"><label>Validade Treinamento</label><input type="text" id="opValidadeTreinamento" disabled></div>
        <div class="form-group"><label>Status</label><input type="text" id="opStatus" disabled></div>
      </div>
    </section>

    <!-- Alterar senha -->
    <section class="form-panel">
      <div class="panel-top">
        <div>
          <div class="mini-badge green">Segurança</div>
          <h2 class="panel-title">Alterar Senha de Acesso</h2>
        </div>
      </div>

      <div class="form-grid" style="margin-top:15px;">
        <div class="form-group">
          <label style="color:#f0ad4e;">Nova Senha</label>
          <input type="password" id="opNovaSenha" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="form-group">
          <label style="color:#f0ad4e;">Confirmar Nova Senha</label>
          <input type="password" id="opConfirmaSenha" placeholder="Repita a nova senha">
        </div>
      </div>

      <div class="actions" style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
        <button class="save-btn" style="background-color:#555;" id="btnVoltar">← Voltar ao Painel</button>
        <button class="save-btn" id="btnSalvarSenha">Atualizar Minha Senha</button>
      </div>
    </section>
  </main>

  <script src="../scripts/auth.js" data-roles="operador,admin,rh"></script>
  <script src="../scripts/perfil_operador.js"></script>
</body>
</html>
