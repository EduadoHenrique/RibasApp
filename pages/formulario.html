<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RH Industrial - Operador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body class="admin-body">

  <main class="dashboard">
    <header class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center;">
      <div>
        <div class="mini-badge" id="formBadge">Cadastro RH</div>
        <h1 class="dashboard-title" id="formTitle">Novo Operador</h1>
      </div>
      <button id="logoutBtn" class="save-btn" style="background-color: #d9534f;">Deslogar</button>
    </header>

    <section class="form-panel">
      <div class="panel-top">
        <div>
          <div class="mini-badge green">Formulário</div>
          <h2 class="panel-title">Dados do Profissional</h2>
        </div>
        <div class="status-pill">Sistema Online</div>
      </div>

      <div class="form-grid">
        <div class="form-group"><label>Nome</label><input type="text" id="nome"></div>
        <div class="form-group"><label>Matrícula</label><input type="text" id="matricula"></div>
        <div class="form-group"><label>Função</label><input type="text" id="funcao"></div>
        <div class="form-group"><label>Telefone</label><input type="text" id="telefone"></div>
        <div class="form-group">
          <label>CNH</label>
          <select id="cnh">
            <option>A</option><option>B</option><option>C</option><option>D</option><option>E</option>
          </select>
        </div>
        <div class="form-group"><label>Validade CNH</label><input type="date" id="validadeCnh"></div>
        <div class="form-group"><label>ASO</label><input type="date" id="aso"></div>
        <div class="form-group"><label>Treinamento</label><input type="text" id="treinamento"></div>
        <div class="form-group"><label>Validade Treinamento</label><input type="date" id="validadeTreinamento"></div>
        <div class="form-group">
          <label>Status</label>
          <select id="status">
            <option>Ativo</option><option>Bloqueado</option><option>Férias</option>
          </select>
        </div>
      </div>

      <div class="actions" style="display: flex; gap: 10px; justify-content: flex-end;">
        <button class="save-btn" style="background-color: #555;" onclick="window.location.href='rh.html'">Voltar</button>
        <button class="save-btn" id="saveOperator">Salvar Operador</button>
      </div>
    </section>
  </main>

  <script src="../scripts/auth.js" data-roles="admin,rh"></script>
  <script src="../scripts/formulario.js"></script>
</body>
</html>
