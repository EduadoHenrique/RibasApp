<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload de Documentação do Veículo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body class="admin-body">
  <main class="dashboard">
    <header class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center;">
      <div>
        <div class="mini-badge" style="background-color: #5cb85c;">Atualização de Frota</div>
        <h1 class="dashboard-title">Upload de Documento</h1>
      </div>
      <button class="logout-btn" id="logoutBtn">Deslogar</button>
    </header>

    <section class="form-panel">
      <div class="panel-top">
        <h2 class="panel-title">Vincular Arquivo ao Veículo</h2>
      </div>

      <div class="form-grid" style="display: flex; flex-direction: column; gap: 20px; margin-top: 20px;">
        <div class="form-group">
          <label>Identificação do Veículo Alvo</label>
          <select id="veiculoSelect" style="height: 50px; font-size: 1.1rem;">
            <option value="">Carregando veículos...</option>
          </select>
        </div>

        <div class="form-group">
          <label>Tipo de Documentação</label>
          <select id="tipoDocSelect" style="height: 50px; font-size: 1.1rem;">
            <option>CRLV / Licenciamento Anual</option>
            <option>Laudo de Inspeção Certificada (ART)</option>
            <option>Seguro Obrigatório / RCTR-C</option>
            <option>Outros Recibos de Campo</option>
          </select>
        </div>

        <div class="form-group" style="border: 2px dashed #ccc; padding: 30px; text-align: center; border-radius: 6px; background-color: #fafafa;">
          <p style="margin: 0; font-size: 1.05rem; font-weight: 500;">🔗 O link do documento será solicitado ao clicar em "Fazer Upload"</p>
          <p style="margin-top: 10px; color: #777; font-size: 0.9rem;">Cole o link de um arquivo já hospedado (Google Drive, OneDrive etc). Upload direto de arquivo ainda não é suportado.</p>
        </div>
      </div>

      <div class="actions" style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 25px;">
        <button class="save-btn" style="background-color: #555;" id="btnVoltar">Voltar</button>
        <button class="save-btn" style="background-color: #5cb85c;" id="btnUpload">Fazer Upload</button>
      </div>
    </section>
  </main>

  <script src="../scripts/api.js"></script>
  <script src="../scripts/auth.js" data-roles="admin,rh,operador"></script>
  <script>
    const veiculoSelect = document.getElementById("veiculoSelect");

    async function carregarVeiculos() {
      veiculoSelect.innerHTML = '<option value="">Carregando veículos...</option>';
      try {
        const veiculos = await RibasAPI.Veiculos.list();
        veiculoSelect.innerHTML = "";
        if (veiculos.length === 0) {
          veiculoSelect.innerHTML = '<option value="">Nenhum veículo cadastrado</option>';
        } else {
          veiculos.forEach((v) => {
            const opt = document.createElement("option");
            opt.value = v._id;
            opt.textContent = `${v.modelo} (${v.placa})`;
            veiculoSelect.appendChild(opt);
          });
        }
      } catch (error) {
        veiculoSelect.innerHTML = '<option value="">Erro ao carregar veículos</option>';
      }
    }
    carregarVeiculos();

    document.getElementById("btnUpload").addEventListener("click", async () => {
      const veiculoId = veiculoSelect.value;
      const tipoDoc = document.getElementById("tipoDocSelect").value;
      const url = window.prompt("Cole o link do documento (Google Drive, OneDrive etc.):");

      if (!veiculoId) {
        alert("Selecione o veículo de destino.");
        return;
      }
      if (!url) {
        alert("É necessário informar o link do documento.");
        return;
      }

      try {
        await RibasAPI.DocumentosVeiculo.create({
          veiculoId,
          nome: tipoDoc,
          documentoUrl: url
        });
        if (navigator.vibrate) navigator.vibrate([150, 50, 150]);
        alert("Documento vinculado com sucesso!");
        window.location.href = "operador.html";
      } catch (error) {
        alert("Não foi possível vincular o documento: " + error.message);
      }
    });

    // Voltar para página correta conforme papel
    document.getElementById("btnVoltar").addEventListener("click", () => {
      const user = RibasAuth.user || {};
      if (user.role === "admin") window.location.href = "admin.html";
      else window.location.href = "operador.html";
    });

    document.getElementById("logoutBtn").addEventListener("click", () => RibasAuth.logout());
  </script>
</body>
</html>
